name: BFlow Studio Deploy

on:
  push:
    branches:
      - main
      - infra-test

permissions:
  id-token: write
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  security:
    name: Security checks
    uses: ./.github/workflows/security.yml

  deploy:
    name: Deploy to ECS
    needs: security
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Verify ECR access
        run: |
          aws ecr describe-repositories
          aws ecr list-images --repository-name bflow-backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true

          tags: |
            ${{ vars.ECR_REPOSITORY }}:latest
            ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate task definition
        env:
          ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
          ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CLOUDWATCH_LOG_GROUP: ${{ vars.CLOUDWATCH_LOG_GROUP }}
          RDS_SECRET_ARN: ${{ vars.RDS_SECRET_ARN }}
        run: |
          envsubst < ecs/task-definition.template.json > ecs/task-definition.json

      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-definition.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-task-definition.outputs.task-definition }} \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition=$TASK_DEFINITION_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --service ${{ vars.ECS_SERVICE_NAME }} \
            --task-definition ${{ steps.register-task.outputs.task_definition }} \
            --force-new-deployment

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }}