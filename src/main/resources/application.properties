spring.application.name=BFlow
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/
app.base-url=${BASE_URL:http://localhost:8080}

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bflow}?sslmode=${DB_SSL_MODE:disable}&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
#spring.main.lazy-initialization=true

# Hibernate/JPA Configuration
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.format-sql=false

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.fail-on-missing-locations=true
spring.flyway.validate-migration-naming=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# AWS integration properties
aws.region=${AWS_REGION}
aws.ses.from=${AWS_SES_FROM_EMAIL}

management.info.env.enabled=true
info.app.name=BFlow
info.app.version=0.1.0
info.app.description=Finance management API
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.git.enabled=true

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
support.email=support@bflow-studio.com
app.email.logo-url=${LOGO_URL}
security.password-reset.expiration-minutes=15
security.email-verification.expiration-hours=24

# Cognito Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI}

spring.data.jpa.repositories.bootstrap-mode=lazy

#app.idempotency.ttl=30s For testing only
